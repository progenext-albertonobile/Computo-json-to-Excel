<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Computo XLSX Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -.02em;
      margin-bottom: .3rem;
    }

    .subtitle {
      font-size: .875rem;
      color: #6b7280;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .4rem;
    }

    .optional { font-weight: 400; color: #9ca3af; font-size: .75rem; margin-left:.3rem; }

    .drop-zone {
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      margin-bottom: 1.25rem;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #4f46e5; background: #f5f3ff; }
    .drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .drop-zone .icon { font-size: 1.5rem; margin-bottom: .25rem; }
    .drop-zone .label-text { font-size: .875rem; color: #6b7280; }
    .drop-zone .file-name {
      margin-top: .4rem;
      font-size: .8125rem;
      font-weight: 600;
      color: #4f46e5;
      word-break: break-all;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-decoration: none;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .btn-primary { background: #4f46e5; color: #fff; width: 100%; justify-content: center; }
    .btn-primary:hover:not(:disabled) { background: #4338ca; }
    .btn-success { background: #059669; color: #fff; width: 100%; justify-content: center; margin-top: .75rem; }
    .btn-success:hover:not(:disabled) { background: #047857; }

    .status {
      border-radius: 8px;
      padding: .9rem 1rem;
      margin: 1.25rem 0 0;
      font-size: .875rem;
      line-height: 1.5;
      display: none;
    }
    .status.info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .status.success { background: #f0fdf4; color: #065f46; border: 1px solid #a7f3d0; }
    .status.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .status.warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .status.visible { display: block; }

    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: .8125rem; }
    th { background: #f9fafb; font-weight: 600; text-align: left; padding: .5rem .75rem; border: 1px solid #e5e7eb; color: #374151; }
    td { padding: .45rem .75rem; border: 1px solid #e5e7eb; }
    tr:nth-child(even) td { background: #f9fafb; }
    .overflow-row td { background: #fef2f2 !important; color: #991b1b; font-weight: 600; }
    .ok-row td { }

    .section-title {
      font-size: .8125rem;
      font-weight: 700;
      color: #374151;
      margin: 1rem 0 .25rem;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    hr { border: none; border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
  </style>
</head>
<body>
<div class="card">
  <h1>Computo XLSX Generator</h1>
  <p class="subtitle">Upload a JSON bundle to validate and generate a branded Excel file.</p>

  <label for="jsonInput">JSON Input File</label>
  <div class="drop-zone" id="jsonZone">
    <input type="file" id="jsonInput" accept=".json" />
    <div class="icon">📄</div>
    <div class="label-text">Click or drag a <strong>.json</strong> file here</div>
    <div class="file-name" id="jsonName"></div>
  </div>

  <label for="templateInput">Template XLSX <span class="optional">(optional — uses server default)</span></label>
  <div class="drop-zone" id="templateZone">
    <input type="file" id="templateInput" accept=".xlsx" />
    <div class="icon">📊</div>
    <div class="label-text">Click or drag a <strong>.xlsx</strong> template here</div>
    <div class="file-name" id="templateName"></div>
  </div>

  <button class="btn btn-primary" id="validateBtn" onclick="runValidate()">
    Validate &amp; Generate
  </button>

  <div class="status" id="statusBox"></div>

  <div id="results" style="display:none">
    <hr />
    <div class="section-title">Sections</div>
    <table id="sectionsTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Label</th>
          <th>Items</th>
          <th>Capacity</th>
          <th>Overflow</th>
        </tr>
      </thead>
      <tbody id="sectionsBody"></tbody>
    </table>

    <div class="section-title" style="margin-top:1rem">External Items</div>
    <table>
      <tbody id="externalBody"></tbody>
    </table>

    <div id="downloadArea"></div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  function setupDropZone(zone, input, nameEl) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('over');
      const f = e.dataTransfer.files[0];
      if (f) { setFile(input, nameEl, f); }
    });
    input.addEventListener('change', () => {
      if (input.files[0]) setFile(input, nameEl, input.files[0]);
    });
  }

  function setFile(input, nameEl, file) {
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    nameEl.textContent = file.name;
  }

  setupDropZone($('jsonZone'),     $('jsonInput'),     $('jsonName'));
  setupDropZone($('templateZone'), $('templateInput'), $('templateName'));

  function showStatus(msg, type) {
    const box = $('statusBox');
    box.className = 'status visible ' + type;
    box.innerHTML = msg;
  }

  function setLoading(on) {
    const btn = $('validateBtn');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span> Processing…'
      : 'Validate &amp; Generate';
  }

  async function runValidate() {
    const jsonFile = $('jsonInput').files[0];
    if (!jsonFile) { showStatus('Please select a JSON file first.', 'info'); return; }

    $('results').style.display = 'none';
    $('downloadArea').innerHTML = '';
    setLoading(true);
    showStatus('Running validation…', 'info');

    const fd = new FormData();
    fd.append('json_file', jsonFile);
    const tplFile = $('templateInput').files[0];
    if (tplFile) fd.append('template_file', tplFile);

    let vData;
    try {
      const res = await fetch('/validate', { method: 'POST', body: fd });
      const body = await res.json();
      if (!res.ok) {
        showStatus('Error: ' + (body.detail || res.statusText), 'error');
        setLoading(false);
        return;
      }
      vData = body;
    } catch (e) {
      showStatus('Network error: ' + e.message, 'error');
      setLoading(false);
      return;
    }

    renderValidation(vData);

    if (!vData.ok) {
      showStatus(
        '⚠️ Overflow detected — generation blocked. Reduce items or expand template capacity.',
        'error'
      );
      setLoading(false);
      return;
    }

    showStatus('Validation OK — generating XLSX…', 'info');

    const fd2 = new FormData();
    fd2.append('json_file', jsonFile);
    if (tplFile) fd2.append('template_file', tplFile);

    try {
      const res2 = await fetch('/generate', { method: 'POST', body: fd2 });
      if (!res2.ok) {
        const body2 = await res2.json().catch(() => ({ detail: res2.statusText }));
        showStatus('Generation error: ' + (body2.detail || res2.statusText), 'error');
        setLoading(false);
        return;
      }

      const blob = await res2.blob();
      const disp = res2.headers.get('Content-Disposition') || '';
      const match = disp.match(/filename="([^"]+)"/);
      const fname = match ? match[1] : 'COMPUTO_OUTPUT.xlsx';

      const url = URL.createObjectURL(blob);
      $('downloadArea').innerHTML = `
        <a href="${url}" download="${fname}" class="btn btn-success" style="margin-top:1rem">
          Download ${fname}
        </a>`;

      showStatus('XLSX generated successfully.', 'success');
    } catch (e) {
      showStatus('Network error during generation: ' + e.message, 'error');
    }

    setLoading(false);
  }

  function renderValidation(data) {
    const tbody = $('sectionsBody');
    tbody.innerHTML = '';
    data.sections.forEach((sec, i) => {
      const tr = document.createElement('tr');
      tr.className = sec.overflow > 0 ? 'overflow-row' : 'ok-row';
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${escHtml(sec.label)}</td>
        <td>${sec.items}</td>
        <td>${sec.capacity}</td>
        <td>${sec.overflow > 0 ? '⚠ ' + sec.overflow : '✓ 0'}</td>`;
      tbody.appendChild(tr);
    });

    const ext = data.external;
    const extBody = $('externalBody');
    extBody.innerHTML = `
      <tr ${ext.overflow > 0 ? 'class="overflow-row"' : ''}>
        <td><strong>Count</strong></td><td>${ext.count}</td>
        <td><strong>Capacity</strong></td><td>${ext.capacity}</td>
        <td><strong>Overflow</strong></td>
        <td>${ext.overflow > 0 ? '⚠ ' + ext.overflow : '✓ 0'}</td>
      </tr>`;

    $('results').style.display = 'block';
  }

  function escHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
</script>
</body>
</html>
