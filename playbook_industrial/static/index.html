<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Computo XLSX Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: .3rem;
    }

    .subtitle {
      font-size: .875rem;
      color: #6b7280;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .4rem;
    }

    .drop-zone {
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      margin-bottom: 1.25rem;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #4f46e5; background: #f5f3ff; }
    .drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .drop-zone .icon { font-size: 1.75rem; margin-bottom: .25rem; }
    .drop-zone .label-text { font-size: .875rem; color: #6b7280; }
    .drop-zone .file-name {
      margin-top: .4rem;
      font-size: .8125rem;
      font-weight: 600;
      color: #4f46e5;
      word-break: break-all;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-decoration: none;
      width: 100%;
      justify-content: center;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #4338ca; }
    .btn-success { background: #059669; color: #fff; margin-top: .75rem; }
    .btn-success:hover:not(:disabled) { background: #047857; }

    .status {
      border-radius: 8px;
      padding: .9rem 1rem;
      margin: 1.25rem 0 0;
      font-size: .875rem;
      line-height: 1.5;
      display: none;
    }
    .status.info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .status.success { background: #f0fdf4; color: #065f46; border: 1px solid #a7f3d0; }
    .status.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .status.visible { display: block; }

    .meta {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: .85rem 1rem;
      margin-top: 1rem;
      font-size: .8125rem;
      color: #374151;
      display: none;
    }
    .meta.visible { display: block; }
    .meta strong { color: #111827; }
    .meta dl { display: grid; grid-template-columns: max-content 1fr; gap: .3rem .75rem; }
    .meta + .meta { margin-top: .6rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .5rem;
      margin: .75rem 0;
    }
    .stat {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: .55rem .65rem;
      text-align: center;
    }
    .stat .v { font-size: 1.05rem; font-weight: 700; color: #1a3a5c; line-height: 1.2; }
    .stat .l { font-size: .68rem; color: #6b7280; text-transform: uppercase; letter-spacing: .03em; margin-top: .15rem; }

    .chapter-list { margin-top: .25rem; }
    .chapter-row {
      display: flex;
      justify-content: space-between;
      gap: .5rem;
      padding: .35rem .5rem;
      border-bottom: 1px solid #eef0f3;
      font-size: .8125rem;
    }
    .chapter-row:last-child { border-bottom: none; }
    .chapter-row .name { color: #111827; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chapter-row .count { color: #6b7280; font-size: .75rem; flex-shrink: 0; }
    .chapter-row .amt { color: #1a3a5c; font-weight: 600; flex-shrink: 0; min-width: 90px; text-align: right; font-variant-numeric: tabular-nums; }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .55rem .5rem;
      margin-top: .5rem;
      background: #1a3a5c;
      color: #fff;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 700;
    }
    .total-row .amt { font-variant-numeric: tabular-nums; }

    .excl-row {
      display: flex;
      justify-content: space-between;
      gap: .5rem;
      padding: .35rem .5rem;
      margin-top: .35rem;
      background: #fef3e7;
      border: 1px solid #fcd9b6;
      border-radius: 6px;
      font-size: .78rem;
      color: #7c4a16;
    }
    .excl-row .amt { font-weight: 600; font-variant-numeric: tabular-nums; }

    h3.section-title {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #6b7280;
      margin: .85rem 0 .35rem;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <h1>Computo XLSX Generator</h1>
  <p class="subtitle">Carica il JSON del computo per generare il file Excel brandizzato.</p>

  <label for="jsonInput">File JSON</label>
  <div class="drop-zone" id="jsonZone">
    <input type="file" id="jsonInput" accept=".json" />
    <div class="icon">📄</div>
    <div class="label-text">Clicca o trascina un file <strong>.json</strong></div>
    <div class="file-name" id="jsonName"></div>
  </div>

  <div class="meta" id="metaBox">
    <dl id="metaList"></dl>

    <div class="stats-grid" id="statsGrid"></div>

    <h3 class="section-title">Capitoli</h3>
    <div class="chapter-list" id="chapterList"></div>

    <div class="total-row" id="totalRow" style="display:none;">
      <span>TOTALE STIMATO — IVA esclusa</span>
      <span class="amt" id="totalAmt"></span>
    </div>

    <div id="exclusionsBox"></div>
  </div>

  <div style="display:flex; gap:.75rem; margin-top:1rem;">
    <button class="btn btn-primary" id="generateBtn" style="flex:1"
            onclick="runGenerate('/generate','COMPUTO')">
      Genera Computo esteso
    </button>
    <button class="btn" id="generateSintBtn" style="flex:1; background:#0f766e; color:#fff;"
            onclick="runGenerate('/generate/sintesi','STIMA')">
      Genera Stima cliente
    </button>
  </div>

  <div class="status" id="statusBox"></div>

  <div id="downloadArea"></div>
</div>

<script>
  const $ = id => document.getElementById(id);

  function setupDropZone(zone, input, nameEl) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('over');
      const f = e.dataTransfer.files[0];
      if (f) { setFile(input, nameEl, f); }
    });
    input.addEventListener('change', () => {
      if (input.files[0]) setFile(input, nameEl, input.files[0]);
    });
  }

  function setFile(input, nameEl, file) {
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    nameEl.textContent = file.name;
    previewMeta(file);
  }

  setupDropZone($('jsonZone'), $('jsonInput'), $('jsonName'));

  // ── Calcolo prezzo cliente (replica esatta di _calc_prezzo in Python) ──
  function calcPrezzo(row) {
    const qty  = row.qty ?? 1;
    const pu   = row.pu ?? 0;
    const sc   = row.sc ?? 0;
    const oa   = row.op_acc ?? 0;
    const inst = row.inst ?? 0;
    const ric  = row.ric ?? 0;
    const impr = row.impr ?? 0;
    const F = qty * pu;
    const H = F * (1 - sc);
    const J = H * oa;
    const L = (H + J) * inst;
    const N = (H + J + L) * ric;
    const O = H + J + L + N;
    return Math.round(O * (1 + impr) * 100) / 100;
  }

  function rowAmount(row) {
    if (row.type === 'voce_lumpsum') return Number(row.total ?? 0);
    if (['voce', 'voce_highlight', 'voce_demolizione', 'voce_trasporto', 'voce_esterna']
        .includes(row.type)) {
      return calcPrezzo(row);
    }
    return 0;
  }

  function fmtEur(n) {
    return new Intl.NumberFormat('it-IT', {
      style: 'currency', currency: 'EUR', maximumFractionDigits: 0
    }).format(n);
  }

  function analyze(rows) {
    const counts = {};
    const chapters = [];   // [{label, voci, amount}]
    const exclusions = []; // [{desc, amount}]
    let inExclusions = false;
    let cur = null;        // current chapter
    let totVoci = 0;

    for (const r of rows) {
      const t = r.type;
      counts[t] = (counts[t] || 0) + 1;

      if (t === 'esclusioni') {
        inExclusions = true;
        if (cur) { chapters.push(cur); cur = null; }
        continue;
      }
      if (t === 'sezione') {
        if (cur) chapters.push(cur);
        cur = { label: r.label || '(sezione)', voci: 0, amount: 0 };
        inExclusions = false;
        continue;
      }
      if (inExclusions && t === 'voce_esterna') {
        exclusions.push({ desc: r.desc || '(voce esterna)', amount: calcPrezzo(r) });
        continue;
      }
      if (['voce', 'voce_highlight', 'voce_demolizione', 'voce_trasporto',
           'voce_lumpsum'].includes(t)) {
        const amt = rowAmount(r);
        if (cur) { cur.voci += 1; cur.amount += amt; }
        totVoci += 1;
      }
    }
    if (cur) chapters.push(cur);

    const total = chapters.reduce((s, c) => s + c.amount, 0);
    return { counts, chapters, exclusions, totVoci, total };
  }

  async function previewMeta(file) {
    $('metaBox').classList.remove('visible');
    $('downloadArea').innerHTML = '';
    hideStatus();
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const meta = data.metadata || {};
      const rows = Array.isArray(data.rows) ? data.rows : [];

      // Metadata table
      const list = $('metaList');
      list.innerHTML = '';
      const fields = [
        ['Cliente', meta.cliente],
        ['Indirizzo', meta.indirizzo],
        ['Data', meta.data],
        ['Titolo', meta.titolo],
      ];
      fields.forEach(([k, v]) => {
        if (v) {
          const dt = document.createElement('dt');
          dt.innerHTML = `<strong>${k}:</strong>`;
          const dd = document.createElement('dd');
          dd.textContent = v;
          list.appendChild(dt);
          list.appendChild(dd);
        }
      });

      // Analysis
      const { chapters, exclusions, totVoci, total } = analyze(rows);

      // Stats
      const grid = $('statsGrid');
      grid.innerHTML = '';
      const stats = [
        [chapters.length, 'Capitoli'],
        [totVoci, 'Voci'],
        [rows.length, 'Righe JSON'],
      ];
      stats.forEach(([v, l]) => {
        const d = document.createElement('div');
        d.className = 'stat';
        d.innerHTML = `<div class="v">${v}</div><div class="l">${l}</div>`;
        grid.appendChild(d);
      });

      // Chapter list
      const chList = $('chapterList');
      chList.innerHTML = '';
      if (chapters.length === 0) {
        chList.innerHTML = '<div style="color:#9ca3af; font-size:.78rem; padding:.4rem .5rem;">Nessun capitolo (sezione) trovato</div>';
      } else {
        chapters.forEach((c, i) => {
          const row = document.createElement('div');
          row.className = 'chapter-row';
          row.innerHTML = `
            <span class="name" title="${c.label.replace(/"/g,'&quot;')}">${i+1}. ${c.label}</span>
            <span class="count">${c.voci} voci</span>
            <span class="amt">${fmtEur(c.amount)}</span>`;
          chList.appendChild(row);
        });
      }

      // Total
      if (total > 0) {
        $('totalRow').style.display = 'flex';
        $('totalAmt').textContent = fmtEur(total);
      } else {
        $('totalRow').style.display = 'none';
      }

      // Exclusions
      const exBox = $('exclusionsBox');
      exBox.innerHTML = '';
      if (exclusions.length) {
        const head = document.createElement('h3');
        head.className = 'section-title';
        head.textContent = `Esclusioni (${exclusions.length})`;
        exBox.appendChild(head);
        exclusions.forEach(e => {
          const r = document.createElement('div');
          r.className = 'excl-row';
          r.innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${e.desc.replace(/"/g,'&quot;')}">${e.desc}</span><span class="amt">${fmtEur(e.amount)}</span>`;
          exBox.appendChild(r);
        });
      }

      $('metaBox').classList.add('visible');
    } catch (e) {
      showStatus('JSON non valido: ' + e.message, 'error');
    }
  }

  function showStatus(msg, type) {
    const box = $('statusBox');
    box.className = 'status visible ' + type;
    box.innerHTML = msg;
  }

  function hideStatus() {
    $('statusBox').className = 'status';
  }

  function setLoading(on, prefix = 'COMPUTO') {
    const btn1 = $('generateBtn');
    const btn2 = $('generateSintBtn');
    btn1.disabled = on;
    btn2.disabled = on;
    if (on) {
      const target = prefix === 'STIMA' ? btn2 : btn1;
      target.innerHTML = '<span class="spinner"></span> Generazione…';
    } else {
      btn1.innerHTML = 'Genera Computo esteso';
      btn2.innerHTML = 'Genera Stima cliente';
    }
  }

  async function runGenerate(endpoint = '/generate', prefix = 'COMPUTO') {
    const jsonFile = $('jsonInput').files[0];
    if (!jsonFile) { showStatus('Seleziona prima un file JSON.', 'info'); return; }

    $('downloadArea').innerHTML = '';
    setLoading(true, prefix);
    showStatus('Generazione in corso…', 'info');

    const fd = new FormData();
    fd.append('json_file', jsonFile);

    try {
      const res = await fetch(endpoint, { method: 'POST', body: fd });
      if (!res.ok) {
        const body = await res.json().catch(() => ({ detail: res.statusText }));
        showStatus('Errore: ' + (body.detail || res.statusText), 'error');
        setLoading(false);
        return;
      }

      const blob = await res.blob();
      const disp = res.headers.get('Content-Disposition') || '';
      const match = disp.match(/filename="([^"]+)"/);
      const fname = match ? match[1] : `${prefix}_OUTPUT.xlsx`;

      const url = URL.createObjectURL(blob);
      $('downloadArea').innerHTML = `
        <a href="${url}" download="${fname}" class="btn btn-success">
          Scarica ${fname}
        </a>`;

      showStatus(`${prefix} generato con successo.`, 'success');
    } catch (e) {
      showStatus('Errore di rete: ' + e.message, 'error');
    }

    setLoading(false);
  }
</script>
</body>
</html>
